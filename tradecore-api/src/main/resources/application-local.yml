spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cmp?currentSchema=tradecore
    username: cmp
    password: cmp
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: tradecore
    schemas: tradecore

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: tradecore
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: true

  sql:
    init:
      mode: never

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

logging:
  level:
    org.hibernate.SQL: debug

tradecore:
  outbox:
    relay:
      enabled: true
      batch-size: 20
      fixed-delay-ms: 5000
    topics:
      order-placed: tradecore.order.placed
      order-cancelled: tradecore.order.cancelled
      execution-applied: tradecore.execution.applied